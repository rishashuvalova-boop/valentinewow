<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты будешь моей валентинкой, дрысясися?</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #ffc3e6, #ffe9f5);
            font-family: "Century Gothic", Arial, sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            font-size: 26px;
            font-weight: bold;
            color: #ff2f8b;
            padding: 0 15px;
            text-shadow: 0 0 8px rgba(255, 0, 140, 0.25);
        }

        .heart {
            position: fixed;
            bottom: -20px;
            font-size: 22px;
            animation: floatUp 4.5s linear infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.7); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-130vh) scale(1.4); opacity: 0; }
        }

        #container {
            max-width: 430px;
            padding: 10px;
            margin: 0 auto;
            margin-top: 10px;
        }

        #mainImage {
            width: 85%;
            max-width: 330px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(255, 0, 120, 0.2);
            transition: 0.4s;
        }

        #buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        button {
            border: none;
            padding: 16px 28px;
            font-size: 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.25s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: relative;
            z-index: 2;
        }

        #yesBtn {
            background-color: #ff4f9e;
            position: relative;
            z-index: 3;
        }

        #noBtn {
            background-color: #6d6dff;
            /* дрожание убрано */
            position: relative;
            z-index: 1;
        }

        #yayText {
            display: none;
            font-size: 38px;
            font-weight: bold;
            color: #ff0077;
            margin-top: 25px;
            text-shadow: 0 0 10px rgba(255, 0, 170, 0.5);
            animation: pop 0.6s ease forwards;
        }

        @keyframes pop {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }
            button {
                font-size: 19px;
                padding: 14px 20px;
            }
            #mainImage {
                width: 92%;
            }
        }
    </style>
</head>

<body>

<h1>Ты будешь моей валентинкой, дрысясися?💕</h1>

<div id="hearts-container"></div>

<div id="container">

    <img id="mainImage" src="start.jpg" alt="image">

    <div id="buttons">
        <button id="yesBtn">Да</button>
        <button id="noBtn">Нет</button>
    </div>

    <div id="yayText">Победааааааа 💖</div>

</div>

<script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const mainImage = document.getElementById("mainImage");
    const yayText = document.getElementById("yayText");
    const buttonsDiv = document.getElementById("buttons");

    let noTexts = [
        "В смысле нет?",
        "Ну ты чё...",
        "Але, Пакистан",
        "Подумай ещё раз",
        "Ты уверен?",
        "Ну пожалуйстаааааа",
        "Эй... так дела не делаются"
    ];

    let images = [
        "img2.jpg",
        "img3.jpg",
        "img4.jpg",
        "img5.jpg",
        "img7.jpg",
        "img6.jpg",
        "img8.jpg"
    ];

    let count = 0;

    yesBtn.onclick = () => {
        buttonsDiv.style.display = "none";
        yayText.style.display = "block";
        mainImage.src = "yes.jpg";
    };

    noBtn.onclick = () => {
        if (count < noTexts.length) {
            noBtn.textContent = noTexts[count];
        }

        if (count < images.length) {
            mainImage.src = images[count];
        }

        yesBtn.style.paddingLeft = (28 + count * 18) + "px";
        yesBtn.style.paddingRight = (28 + count * 18) + "px";

        count++;

        if (count > 7) {
            noBtn.style.opacity = "0";
            noBtn.style.pointerEvents = "none";
            noBtn.style.transform = "translateX(-200px)";
        }
    };

    const heartsContainer = document.getElementById("hearts-container");

    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.textContent = "💋";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (16 + Math.random() * 18) + "px";
        heart.style.animationDuration = (3.5 + Math.random() * 3) + "s";

        heartsContainer.appendChild(heart);

        setTimeout(() => heart.remove(), 7000);
    }

    setInterval(createHeart, 450);
</script>

</body>
</html>
